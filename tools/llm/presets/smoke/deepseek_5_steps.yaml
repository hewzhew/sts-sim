name: deepseek_5_steps
purpose: smoke
description: >
  Short external-provider sanity check. This is intentionally capped and must
  not be used for benchmark or policy quality claims.
script: tools/llm/llm_full_run_controller.py
args:
  provider: openai_compatible
  run_mode: llm_live_controller
  agent_mode: planner
  combat_search_engine: compact
  context_ablation: mechanics_plus_strategy_hints
  trace_level: compact
  journal_format: events
  seed: 42
  ascension: 0
  class: ironclad
  steps: 5
  timeout: 120
  planner_timeout: 120
  out: auto
limits:
  max_llm_calls: 5
  max_steps: 5
  max_wall_seconds: 300
  allow_long_run: false
claims:
  benchmark_claim: false
  policy_quality_claim: false
  winrate_claim: false
  purpose_statement: external_provider_sanity_check
artifacts:
  run_dir: auto
  events: events.jsonl
  summary: summary.json
  stdout: stdout.log
  stderr: stderr.log
  command: command.txt
  resolved_config: resolved_config.yaml
hypothesis: null
acceptance_criteria: []
