name: deepseek_seed42
purpose: watch
description: >
  Interactive DeepSeek live-controller run for observing individual decisions.
  This is not a benchmark and must not be used for policy-quality claims.
script: tools/llm/llm_full_run_controller.py
args:
  provider: openai_compatible
  run_mode: llm_live_controller
  agent_mode: planner
  combat_search_engine: compact
  context_ablation: mechanics_plus_strategy_hints
  trace_level: compact
  journal_format: events
  watch_decisions: true
  watch_max_candidates: 32
  seed: 42
  ascension: 0
  class: ironclad
  steps: 999
  timeout: 120
  planner_timeout: 120
  out: auto
limits:
  max_llm_calls: 80
  max_steps: 999
  max_wall_seconds: 1800
  allow_long_run: false
  require_interactive_watch: true
claims:
  benchmark_claim: false
  policy_quality_claim: false
  winrate_claim: false
  purpose_statement: interactive_observation
artifacts:
  run_dir: auto
  events: events.jsonl
  summary: summary.json
  stdout: stdout.log
  stderr: stderr.log
  command: command.txt
  resolved_config: resolved_config.yaml
hypothesis: null
acceptance_criteria: []
