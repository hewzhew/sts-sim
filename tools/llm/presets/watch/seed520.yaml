name: watch_seed520
description: >
  Interactive watch run on seed 520. This is a case-discovery run, not a
  benchmark. Use the watch window's "s" command to save DecisionCaseV1 artifacts
  when a decision looks interesting or suspicious.
purpose: watch
script: tools/llm/llm_full_run_controller.py

args:
  provider: openai_compatible
  seed: 520
  ascension: 0
  class: ironclad
  run_mode: llm_live_controller
  agent_mode: planner
  combat_search_engine: compact
  context_ablation: mechanics_plus_strategy_hints
  trace_level: compact
  journal_format: events
  watch_decisions: true
  watch_before_llm: true
  watch_max_candidates: 32
  steps: 999
  timeout: 120
  out: auto

limits:
  max_steps: 999
  max_llm_calls: 80
  max_wall_seconds: 900
  allow_long_run: false

claims:
  benchmark_claim: false
  policy_quality_claim: false
  winrate_claim: false
  purpose_statement: case_discovery_watch

artifacts:
  run_dir: auto
  events: events.jsonl
  summary: summary.json
  stdout: stdout.log
  stderr: stderr.log
  command: command.txt
  resolved_config: resolved_config.yaml

hypothesis: null
acceptance_criteria: []
