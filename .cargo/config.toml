[target.x86_64-pc-windows-msvc]
# rustup ships this COFF linker with the Windows MSVC target. It materially
# reduces relink time for the large library-test binary without a machine-
# specific absolute path.
linker = "rust-lld"

[alias]
# Source-architecture checks deliberately live in a dependency-free helper
# package. Keeping them out of the main package prevents a 0.9 MiB source scan
# from compiling the entire simulator as an unused integration-test dependency.
architecture = ["run", "--quiet", "-p", "sts_architecture_checks", "--"]
test-core = ["test", "-p", "sts_simulator", "--lib"]
test-planner = ["test", "-p", "sts_combat_planner", "--lib"]
test-control = ["test", "-p", "sts_simulator_control", "--lib"]
check-workspace = ["check", "--workspace", "--all-targets"]
# The oracle laboratory is deliberately runnable through one Cargo-owned
# entrypoint.  The hidden token and the binary's embedded profile/path checks
# reject stale binaries and accidental `--release --target-dir ...` builds.
oracle-lab = ["run", "--quiet", "--profile", "fast-run", "-p", "sts_simulator_control", "--bin", "oracle_lab", "--", "--canonical-fast-run"]
# Build-owning convenience alias. For repeated diagnostics, `./ol` invokes the
# same canonical binary directly and lets its depfile guard reject stale code.
ol = ["run", "--quiet", "--profile", "fast-run", "-p", "sts_simulator_control", "--bin", "oracle_lab", "--", "--canonical-fast-run"]
# Resident mode is explicit: this lightweight client controls a dedicated
# service binary whose process lifetime preserves the in-memory combat search.
# The one-shot oracle_lab executable remains independently rebuildable.
ol-live = ["run", "--quiet", "--profile", "fast-run", "-p", "oracle_lab_client", "--bin", "oracle_lab_client", "--", "--canonical-fast-run"]
