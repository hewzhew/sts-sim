[package]
name = "sts_sim"
version = "0.1.0"
edition = "2024"

[lib]
name = "sts_sim"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "sts_demo"
path = "src/main.rs"

[[bin]]
name = "ai_demo"
path = "src/bin/ai_demo.rs"

[[bin]]
name = "sentries_test"
path = "src/bin/sentries_test.rs"

[[bin]]
name = "jaw_worm_test"
path = "src/bin/jaw_worm_test.rs"

[[bin]]
name = "interactive_combat"
path = "src/bin/interactive_combat.rs"

[dependencies]
once_cell = "1.19"
pyo3 = { version = "0.27.2", features = ["extension-module"] }
rand = { version = "0.9.2", features = ["small_rng"] }
rand_xoshiro = "0.7.0"
rayon = "1.11.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
smallvec = { version = "1.15.1", features = ["serde", "write"] }
thiserror = "2.0.18"
